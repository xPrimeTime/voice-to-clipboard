name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Install Linux dependencies
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      
      - name: Build Linux binary
        run: wails build -clean -platform linux/amd64
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-to-clipboard-linux-amd64
          path: build/bin/voice-to-clipboard

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Build Windows binary
        run: wails build -clean -platform windows/amd64
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: voice-to-clipboard-windows-amd64
          path: build/bin/voice-to-clipboard.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: voice-to-clipboard-linux-amd64
          path: ./linux
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: voice-to-clipboard-windows-amd64
          path: ./windows
      
      - name: Prepare release files
        run: |
          mv linux/voice-to-clipboard voice-to-clipboard-linux-amd64
          mv windows/voice-to-clipboard.exe voice-to-clipboard-windows-amd64.exe
          chmod +x voice-to-clipboard-linux-amd64
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            voice-to-clipboard-linux-amd64
            voice-to-clipboard-windows-amd64.exe
          body: |
            ## Voice to Clipboard ${{ github.ref_name }}
            
            ### Download
            - **Linux**: `voice-to-clipboard-linux-amd64`
            - **Windows**: `voice-to-clipboard-windows-amd64.exe`
            
            ### Quick Start
            
            **Linux:**
            ```bash
            chmod +x voice-to-clipboard-linux-amd64
            ./voice-to-clipboard-linux-amd64
            ```
            
            **Windows:** Double-click `voice-to-clipboard-windows-amd64.exe`
            
            On first run, you'll be prompted to select and download a transcription model.
            
            ### What's New
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
